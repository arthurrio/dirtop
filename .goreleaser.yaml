version: 2

project_name: dirtop

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    main: .
    binary: dirtop

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: arthurrio
    name: dirtop
  draft: false
  prerelease: auto

brews:
  - name: dirtop
    repository:
      owner: arthurrio
      name: homebrew-dirtop
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update dirtop formula to {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/arthurrio/dirtop"
    description: "Real-time terminal dashboard for monitoring directory stats."
    license: "MIT"
    install: |
      bin.install "dirtop"
    test: |
      assert_match version.to_s, shell_output("#{bin}/dirtop -version")
